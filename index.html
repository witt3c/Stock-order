<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witt3C | 證券批次下單 XML 產生器</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/witt3c">
    <meta property="og:title" content="證券批次下單 XML 產生器 | Witt3C">
    <meta property="og:description" content="高效、直覺的證券批次下單 XML 檔案生成工具。">
</head>

<body>
    <div class="bg-elements">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <nav class="app-navbar">
        <div class="nav-title">
            <i class="fas fa-file-code"></i> 證券批次下單 XML 產生器 <span class="text-gradient">PRO</span>
        </div>
        <button id="theme-toggle" class="theme-btn" aria-label="切換主題">
            <i class="fas fa-sun sun-icon"></i>
            <i class="fas fa-moon moon-icon"></i>
        </button>
    </nav>

    <div class="workspace-layout">
        
        <aside class="control-panel">
            <div class="portal-card">
                <h3><i class="fas fa-user-shield"></i> 個人資料設定</h3>
                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 1rem 0;">
                
                <div class="form-group">
                    <label>身份證字號 / 統一編號</label>
                    <input type="text" placeholder="例如：A123456789" class="form-input">
                </div>
                
                <div class="form-group">
                    <label>券商代號</label>
                    <input type="text" placeholder="例如：9600" class="form-input">
                </div>
                
                <div class="form-group">
                    <label>帳號 (Branch / Account)</label>
                    <input type="text" placeholder="例如：0123456" class="form-input">
                </div>
            </div>
        </aside>

        <main class="data-container">
            
            <div class="portal-card stock-input-box">
                <h3><i class="fas fa-search-plus"></i> 新增股票項目</h3>
                <div class="input-row" style="margin-top: 1.2rem;">
                    <input type="text" placeholder="股號 (如: 2330)" class="form-input min-input">
                    
                    <select class="form-input min-input" style="cursor: pointer;">
                        <option value="B">現股買進</option>
                        <option value="S">現股賣出</option>
                    </select>
                    
                    <input type="number" placeholder="價格" class="form-input min-input">
                    <input type="number" placeholder="張數" class="form-input min-input">
                    
                    <button class="t-btn active" style="height: 42px; padding: 0 20px; font-weight: bold;">
                        <i class="fas fa-plus"></i> 加入批次
                    </button>
                </div>
            </div>

            <div class="portal-card table-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3><i class="fas fa-list-ol"></i> 批次下單預覽列表</h3>
                    <button class="t-btn" style="border-color: var(--accent-3); color: var(--accent-3);">
                        <i class="fas fa-download"></i> 產生 XML 檔案
                    </button>
                </div>
                
                <div class="table-wrapper">
                    <table class="xml-table">
                        <thead>
                            <tr>
                                <th>序號</th>
                                <th>股號</th>
                                <th>名稱</th>
                                <th>動作</th>
                                <th>價格</th>
                                <th>張數</th>
                                <th>預估總額</th>
                                <th style="text-align: center;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>01</td>
                                <td>2330</td>
                                <td>台積電</td>
                                <td><span class="tag" style="background: rgba(236, 72, 153, 0.15); color: var(--accent-2); padding: 3px 8px; border-radius: 4px;">買進</span></td>
                                <td>1,000</td>
                                <td>5</td>
                                <td>5,000,000</td>
                                <td style="text-align: center;">
                                    <button class="t-btn" style="color: #ff4757; border-color: rgba(255,71,87,0.2);">
                                        <i class="fas fa-trash-alt"></i> 刪除
                                    </button>
                                </td>
                            </tr>
                            <tr>
                                <td>02</td>
                                <td>2454</td>
                                <td>聯發科</td>
                                <td><span class="tag" style="background: rgba(129, 140, 248, 0.15); color: var(--accent-1); padding: 3px 8px; border-radius: 4px;">賣出</span></td>
                                <td>1,200</td>
                                <td>2</td>
                                <td>2,400,000</td>
                                <td style="text-align: center;">
                                    <button class="t-btn" style="color: #ff4757; border-color: rgba(255,71,87,0.2);">
                                        <i class="fas fa-trash-alt"></i> 刪除
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
